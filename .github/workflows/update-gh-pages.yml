# 将所有的 web_impl 进行编译、并配置 github pages
name: Deploy All Web Impl

on:
  push:
    branches:
      - "main"
    paths:
      - "cure-graphic/web_impl/**"
      - "cure-physics/web_impl/**"
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies - graphic
        working-directory: cure-graphic/web_impl
        run: pnpm install

      - name: Build - graphic
        working-directory: cure-graphic/web_impl
        run: pnpm run build

      - name: Install dependencies - physics
        working-directory: cure-physics/web_impl
        run: pnpm install

      - name: Build - physics
        working-directory: cure-physics/web_impl
        run: pnpm run build

      - name: Copy Github Page Index HTML
        run: cp -f cure-shared/web_impl/index.html gh-pages/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages
          # .pnpm.js、.pnpm.css 必须上传
          include-hidden-files: true

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v3.0.2-node.24
